    <g transform="translate(158 112) scale(14)">
      <path d="M10 4H5.8Q4 4 4 5.8V18.2Q4 20 5.8 20H10" fill="none" stroke="#16181D" stroke-width="2.25" stroke-linecap="square" stroke-linejoin="round"/>
      <path d="M14 4H18.2Q20 4 20 5.8V18.2Q20 20 18.2 20H14" fill="none" stroke="#16181D" stroke-width="2.25" stroke-linecap="square" stroke-linejoin="round"/>
      <path d="M9 15L15 9" fill="none" stroke="#D61F3C" stroke-width="2.4" stroke-linecap="round"/>
    </g>
    <g fill="#D9E1EF">
      <rect x="92" y="430" width="472" height="12" rx="6"/>
