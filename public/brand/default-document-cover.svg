<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title description">
  <title id="title">기획서 기본 대표 이미지</title>
  <desc id="description">열린 두 기획서 면 사이를 붉은 선이 연결하는 아카이브 심벌</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#E9EEF8"/>
    </linearGradient>
    <radialGradient id="signal" cx="74%" cy="18%" r="70%">
      <stop offset="0" stop-color="#3157D5" stop-opacity=".2"/>
      <stop offset="1" stop-color="#3157D5" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#3157D5" stroke-opacity=".08"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="28" stdDeviation="34" flood-color="#152244" flood-opacity=".14"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#paper)"/>
  <rect width="1600" height="900" fill="url(#signal)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <g opacity=".52" fill="none" stroke="#3157D5">
    <path d="M112 148h260M112 176h162"/>
    <path d="M1228 724h260M1326 752h162"/>
    <circle cx="1296" cy="170" r="54" stroke-opacity=".2"/>
    <circle cx="1296" cy="170" r="86" stroke-opacity=".1"/>
  </g>
  <g filter="url(#shadow)" transform="translate(472 180)">
